<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Usuário</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <h1>Consulta de Usuário</h1>

        <p class="descricao">
            Clique no botão abaixo para buscar dados em uma API.
        </p>

        <button id="btnBuscar">
            Buscar dados
        </button>

        <section class="resultado">

            <div class="campo">
                <strong>Nome:</strong>
                <span id="nome">---</span>
            </div>

            <div class="campo">
                <strong>Email:</strong>
                <span id="email">---</span>
            </div>

            <div class="campo">
                <strong>Telefone:</strong>
                <span id="telefone">---</span>
            </div>

        </section>

    </main>

</body>
<script src="script.js"></script>
</html>
